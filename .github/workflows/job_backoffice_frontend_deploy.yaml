name: Backoffice Frontend Deploy
run-name: Backoffice Frontend Deploy - ${{ inputs.release_version }}

permissions:
  id-token: write
  contents: read

on:
  workflow_call:
    inputs:
      release_env:
        description: 'Release Environment'
        required: true
        default: ""
        type: string
      release_version:
        description: 'Release Version'
        required: true
        default: ""
        type: string
      backend_repo:
        description: 'backend Repo'
        required: false
        default: ""
        type: string
      target_branch:
        description: 'Target Branch'
        required: false
        default: ""
        type: string
      target_version:
        description: 'Target Version'
        required: false
        default: ""
        type: string

env:
  CI: false

env:
  CODEFREEZE: ${{ secrets.CODEFREEZE }}
  GH_PAT_AUTOMATION: ${{ secrets.GH_PAT_AUTOMATION_SEMANTIC_RELEASE }}

jobs:
  ##################################################
  #  QA Deployment
  ##################################################
  frontend-qa-deploy:
    name: Frontend QA Deploy
    if: ${{ inputs.target_branch == 'release' }}
    environment: main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: duclo/web-sysadmin
          ref: refs/tags/${{ inputs.release_version }}
          token: ${{ secrets.DUCLO_GH_MANAGEPACKAGE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: |
          rm -rf .env.prod .env.staging
          npm run build-megatron-qa

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.SYSADMIN_QA_AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload to S3
        run: aws s3 sync build/ s3://wc025-sysadmin-prod-ue1  --region us-east-1 --delete

      - name: CloudFront Cache Invalidation
        run: |
          sleep 15
          aws cloudfront create-invalidation --distribution-id ${{ secrets.SYSADMIN_QA_CF_DISTRIBUTION_ID }} --paths "/*"
          sleep 15

  ##################################################
  #  PROD Deployment
  ##################################################
  frontend-prod-deploy:
    name: Frontend PROD Deploy
    if: ${{ inputs.target_branch == 'production' }}
    environment: main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: duclo/web-sysadmin
          ref: refs/tags/${{ inputs.release_version }}
          token: ${{ secrets.DUCLO_GH_MANAGEPACKAGE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: |
          rm -rf .env.prod .env.staging
          npm run build-megatron-prod

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::619071312308:role/role-wc025-prod-github-ci
          aws-region: us-east-1

      - name: Upload to S3
        run: aws s3 sync build/ s3://wc025-sysadmin-prod-ue1 --region us-east-1 --delete

   