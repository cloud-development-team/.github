name: Backoffice Backend Deploy
run-name: Backoffice Backend Deploy - ${{ inputs.release_env }}

permissions: write-all

on:
  workflow_call:
    inputs:
      release_env:
        description: 'Release Environment'
        required: true
        default: ""
        type: string
      release_version:
        description: 'Release Version'
        required: true
        default: ""
        type: string
      backend_repo:
        description: 'backend Repo'
        required: true
        default: ""
        type: string
      target_branch:
          description: 'Target Branch'
          required: false
          default: ""
          type: string
      target_version:
          description: 'Target Version'
          required: false
          default: ""
          type: string


env:
  CODEFREEZE: ${{ secrets.CODEFREEZE }}
  GH_PAT_AUTOMATION: ${{ secrets.GH_PAT_AUTOMATION_SEMANTIC_RELEASE }}

jobs:     
  ##################################################
  #  QA Deployment
  ##################################################
  backoffice-qa-deployment:
    name: Backoffice QA deployment
    if: ${{ inputs.target_branch == 'release' }}
    environment: main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: cloud-development-team/${{ inputs.backend_repo }}
          ref: refs/heads/main
          token: ${{ secrets.GH_MANAGEPACKAGE_TOKEN }}

      - name: Get Time
        id: time
        uses: nanzm/get-time-action@master
        with:
          timeZone: UTC-9
          format: 'YYYY-MM-DD HH:mm:ss'

      - name: Update qa_version.json
        uses: mikefarah/yq@v4.34.2
        with:
          cmd: |
            yq -i '.["JiraReleaseVersion"].["MainVersion"] = "${{ inputs.release_version }}"' qa_version.json
            yq -i '.["JiraReleaseVersion"].["SWVersion"] = "${{ inputs.target_version }}"' qa_version.json
            yq -i '.["JiraReleaseVersion"].["ReleaseDate"] = "${{ steps.time.outputs.time }}"' qa_version.json

      - name: Create prod_version.json from qa_version.json
        run: |
          jq '{
            JiraReleaseVersion: { MainVersion: "", ReleaseDate: "", SWVersion: "" },
            Service: .Service
          }' qa_version.json > prod_version.json

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions Bot" && \
          git config user.email "<>" && \
          git add --all
          git commit -m "cd: deploy qa for ${{ inputs.release_version }}" && \
          git push origin main
        continue-on-error: true

  backoffice-qa-eks-deployment:
    name: Backoffice QA EKS deployment
    if: ${{ inputs.target_branch == 'release' }}
    needs: [backoffice-qa-deployment]
    environment: main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: cloud-development-team/${{ inputs.backend_repo }}
          ref: refs/heads/main
          token: ${{ secrets.GH_MANAGEPACKAGE_TOKEN }}

      - name: Install yq
        run: |
          wget https://github.com/mikefarah/yq/releases/download/v4.34.2/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Checkout helm repo
        uses: actions/checkout@v4
        with:
          repository: cloud-development-team/webconnect-helm-charts
          ref: refs/heads/main
          token: ${{ secrets.GH_MANAGEPACKAGE_TOKEN }}
          path: helmrepo
      
      - name: Update Helm values (EKS)
        run: |
          set -e
          QA_FILE="qa_version.json"
          HELM_DIR="helmrepo"

          echo "Processing EKS cluster for backoffice"
          jq -r --arg key "Service" '.[$key] | to_entries[] | "\(.key) \(.value)"' $QA_FILE \
          | while read app version; do
            values_file="$HELM_DIR/wc025/qa/app/$app/values.yaml"
            if [ -f "$values_file" ]; then
              yq -i '.deployment.tag = "'"$version"'"' "$values_file"
            else
              echo "WARNING: $values_file not found"
            fi
          done

      - name: Commit Helm changes
        run: |
          cd helmrepo
          git config user.name "GitHub Actions Bot" && \
          git config user.email "<>" && \
          git add --all
          git commit -m "cd: deploy qa for ${{ inputs.release_version }}" && \
          git push origin main
        continue-on-error: true

  ##################################################
  #  PROD Deployment
  ##################################################
  backoffice-prod-deployment:
    name: Backoffice PROD deployment
    if: ${{ inputs.target_branch == 'production' }}
    environment: main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: cloud-development-team/${{ inputs.backend_repo }}
          ref: refs/heads/main
          token: ${{ secrets.GH_MANAGEPACKAGE_TOKEN }}

      - name: Get Time
        id: time
        uses: nanzm/get-time-action@master
        with:
          timeZone: UTC-9
          format: 'YYYY-MM-DD HH:mm:ss'

      - name: Update prod_version.json
        uses: mikefarah/yq@v4.34.2
        with:
          cmd: |
            yq -i '.["JiraReleaseVersion"].["MainVersion"] = "${{ inputs.release_version }}"' prod_version.json
            yq -i '.["JiraReleaseVersion"].["SWVersion"] = "${{ inputs.target_version }}"' prod_version.json
            yq -i '.["JiraReleaseVersion"].["ReleaseDate"] = "${{ steps.time.outputs.time }}"' prod_version.json

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions Bot" && \
          git config user.email "<>" && \
          git add --all
          git commit -m "cd: deploy prod for ${{ inputs.release_version }}" && \
          git push origin main
        continue-on-error: true

  backoffice-prod-eks-deployment:
    name: Backoffice PROD EKS deployment
    if: ${{ inputs.target_branch == 'production' }}
    needs: [backoffice-prod-deployment]
    environment: main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: cloud-development-team/${{ inputs.backend_repo }}
          ref: refs/heads/main
          token: ${{ secrets.GH_MANAGEPACKAGE_TOKEN }}

      - name: Install yq
        run: |
          wget https://github.com/mikefarah/yq/releases/download/v4.34.2/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Checkout helm repo
        uses: actions/checkout@v4
        with:
          repository: cloud-development-team/webconnect-helm-charts
          ref: refs/heads/main
          token: ${{ secrets.GH_MANAGEPACKAGE_TOKEN }}
          path: helmrepo
      
      - name: Update Helm values (EKS)
        run: |
          set -e
          PROD_FILE="prod_version.json"
          HELM_DIR="helmrepo"

          echo "Processing EKS cluster for backoffice PROD"
          jq -r --arg key "Service" '.[$key] | to_entries[] | "\(.key) \(.value)"' $PROD_FILE \
          | while read app version; do
            values_file="$HELM_DIR/wc025/prod/app/$app/values.yaml"
            if [ -f "$values_file" ]; then
              yq -i '.deployment.tag = "'"$version"'"' "$values_file"
            else
              echo "WARNING: $values_file not found"
            fi
          done

      - name: Commit Helm changes
        run: |
          cd helmrepo
          git config user.name "GitHub Actions Bot" && \
          git config user.email "<>" && \
          git add --all
          git commit -m "cd: deploy prod for ${{ inputs.release_version }}" && \
          git push origin main
        continue-on-error: true
