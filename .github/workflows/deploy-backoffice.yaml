name: Backoffice Deploy
run-name: Backoffice Deploy - ${{ inputs.release_version }}

permissions: write-all

on:
  workflow_call:
    inputs:
      release_env:
        description: 'Release Environment'
        required: true
        default: ""
        type: string
      release_version:
        description: 'Release Version'
        required: true
        default: ""
        type: string
      backend_repo:
        description: 'backend Repo'
        required: false
        default: ""
        type: string
      frontend_repo:
        description: 'frontend Repo'
        required: false
        default: ""
        type: string
      target_branch:
          description: 'Target Branch'
          required: true
          default: ""
          type: string
      target_version:
          description: 'Target Version'
          required: false
          default: ""
          type: string
      project:
          description: 'Project'
          required: true
          default: ""
          type: string

jobs:     
  backoffice-backend-deploy:
    name: Deploy Backend Service
    if: ${{ inputs.backend_repo == 'sysadmin-gitops' }}
    uses: ./.github/workflows/job_backoffice_backend_deploy.yaml
    with:
      release_env: ${{ inputs.release_env }}
      backend_repo: ${{ inputs.backend_repo }}
      release_version: ${{ inputs.release_version }}
      target_branch: ${{ inputs.target_branch }}
      target_version: ${{ inputs.target_version }}
    secrets: inherit
